name: CIEDE2000 Test in R

on:
  workflow_dispatch:

env:
  n_csv_lines: 100000000

jobs:
  test-ciede2000-r:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📂 For each step below, a new shell will be started at the repository root
        uses: actions/checkout@v6

      - name: 🛠️ Prepare the R test script
        run: |
           cp -p ciede2000.r ciede2000-driver.r
           printf '%s\n' '' \
           'args <- commandArgs(trailingOnly = TRUE)' \
           'if (0 < length(args)) {' \
           '	file_path <- args[1]' \
           '	chunk_size <- 1000000' \
           '	canonical <- 1 < length(args)' \
           '	con <- file(file_path, open = "r")' \
           '	on.exit(close(con))' \
           '	repeat {' \
           '		lines <- readLines(con, n = chunk_size)' \
           '		if (length(lines) == 0) break' \
           '		v <- do.call(rbind, strsplit(lines, ","))' \
           '		v <- apply(v, 2, as.numeric)' \
           '		delta_e <- ciede2000(v[,1], v[,2], v[,3], v[,4], v[,5], v[,6], v[,7], v[,8], v[,9], canonical)' \
           '		for (i in seq_along(delta_e)) {' \
           '			cat(lines[i], sprintf(",%.14f\n", delta_e[i]), sep = "")' \
           '		}' \
           '	}' \
           '}' \
           '' >> ciede2000-driver.r

      - name: 📦 Set up R and GCC
        run: |
          command -v Rscript > /dev/null || {
            command -v dirmngr > /dev/null && command -v apt-add-repository > /dev/null ||
            { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes --no-install-recommends software-properties-common dirmngr ; }
            . /etc/os-release && wget --no-verbose --no-check-certificate --timeout=5 --tries=2 https://cloud.r-project.org/bin/linux/ubuntu/marutter_pubkey.asc -O- |
            sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/cran.gpg
            echo "deb [signed-by=/etc/apt/trusted.gpg.d/cran.gpg] \
            https://cloud.r-project.org/bin/linux/ubuntu ${VERSION_CODENAME}-cran40/" |
            sudo tee /etc/apt/sources.list.d/cran.list
            sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes r-base
          }
          command -v gcc > /dev/null || { sudo apt-get update --allow-unauthenticated && sudo apt-get install --allow-unauthenticated --no-install-recommends --assume-yes gcc ; }

      - name: 🌐️ Download the CIEDE2000 driver program
        run: wget --no-verbose --no-check-certificate --timeout=5 --tries=2 https://ciede2000.pages-perso.free.fr/static/github/ciede2000-native-precision-driver.c

      - name: ⚙️ Compile the CIEDE2000 driver program in C99
        run: |
            gcc --version
            gcc -std=c99 -Wall -pedantic -O2 -g ciede2000-native-precision-driver.c -o ciede2000-native -lm

      - name: 🎨 Generate ΔE2000 color difference test cases
        run: ./ciede2000-native --number $n_csv_lines --with-weights --output-file test-cases.csv

      - name: 🚀 Run test cases in R and stream to verifier
        run: |
            Rscript -e 'cat("R version:", R.version.string, "\n")'
            Rscript ciede2000-driver.r test-cases.csv             | ./ciede2000-native --precision 11 > summary-simplified.txt
            Rscript ciede2000-driver.r test-cases.csv --canonical | ./ciede2000-native --precision 11 > summary-canonical.txt
            wait

      - name: 🏁 Conclusion
        run: |
          for compliance in simplified canonical; do
            file="summary-$compliance.txt"
            cat "$file"
            #
            if [ "${file%canonical.txt}" = "$file" ]; then
              Q1="[ ] CANONICAL [X] SIMPLIFIED"
            else
              Q1="[X] CANONICAL [ ] SIMPLIFIED"
            fi
            if grep -Fq "$Q1" "$file" && grep -Fq "Error : 0" "$file" && grep -Fq "Successes : $n_csv_lines" "$file"; then
              echo "✔️ Verification of $file successful: all $n_csv_lines color differences were correctly calculated."
            else
              echo "❌ Verification failed. See above for details."
              exit 1
            fi
          done
